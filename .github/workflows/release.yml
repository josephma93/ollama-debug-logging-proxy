name: release

env:
  BREW_TAP_NAME: josephma93/ollama-debug-logging-proxy

on:
  push:
    tags:
      - "v*"

jobs:
  classify-tag:
    name: Classify tag
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
      version: ${{ steps.classify.outputs.version }}
      tag: ${{ steps.classify.outputs.tag }}
    steps:
      - name: Classify version tag
        id: classify
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

  create-release:
    name: Ensure release exists
    needs: classify-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ensure release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.classify-tag.outputs.tag }}
          IS_PRERELEASE: ${{ needs.classify-tag.outputs.is_prerelease }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi

          ARGS=(release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes "")
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            ARGS+=(--prerelease)
          fi
          gh "${ARGS[@]}"

  build-and-upload:
    name: Build and upload macOS artifacts
    needs: create-release
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm64
            target: aarch64-apple-darwin
          - goarch: amd64
            target: x86_64-apple-darwin
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -o dist/ollama-logging-proxy ./cmd/ollama-proxy

      - name: Package release artifact
        env:
          TARGET: ${{ matrix.target }}
        run: |
          STAGE="artifacts/ollama-logging-proxy-${TARGET}"
          mkdir -p "$STAGE/scripts" "$STAGE/launchd"
          cp dist/ollama-logging-proxy "$STAGE/ollama-logging-proxy"
          cp scripts/install-launchd.sh scripts/uninstall-launchd.sh "$STAGE/scripts/"
          cp launchd/com.joseph.ollama-proxy.plist launchd/com.joseph.ollama-private.plist "$STAGE/launchd/"
          tar -czf "artifacts/ollama-logging-proxy-${TARGET}.tar.gz" -C artifacts "ollama-logging-proxy-${TARGET}"
          shasum -a 256 "artifacts/ollama-logging-proxy-${TARGET}.tar.gz" > "artifacts/ollama-logging-proxy-${TARGET}.tar.gz.sha256"

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" \
            "artifacts/ollama-logging-proxy-${{ matrix.target }}.tar.gz" \
            "artifacts/ollama-logging-proxy-${{ matrix.target }}.tar.gz.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  update-formula:
    name: Update Homebrew formula
    needs:
      - classify-tag
      - build-and-upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set formula variables
        id: vars
        env:
          TAG: ${{ needs.classify-tag.outputs.tag }}
          VERSION: ${{ needs.classify-tag.outputs.version }}
          IS_PRERELEASE: ${{ needs.classify-tag.outputs.is_prerelease }}
        run: |
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "formula_path=Formula/ollama-logging-proxy-canary.rb" >> "$GITHUB_OUTPUT"
            echo "formula_class=OllamaLoggingProxyCanary" >> "$GITHUB_OUTPUT"
            echo "desc_suffix= (canary prerelease)" >> "$GITHUB_OUTPUT"
            echo "conflict_formula=ollama-logging-proxy" >> "$GITHUB_OUTPUT"
            echo "caveat_extra=      This canary formula tracks prerelease tags and conflicts with the stable formula." >> "$GITHUB_OUTPUT"
          else
            echo "formula_path=Formula/ollama-logging-proxy.rb" >> "$GITHUB_OUTPUT"
            echo "formula_class=OllamaLoggingProxy" >> "$GITHUB_OUTPUT"
            echo "desc_suffix=" >> "$GITHUB_OUTPUT"
            echo "conflict_formula=ollama-logging-proxy-canary" >> "$GITHUB_OUTPUT"
            echo "caveat_extra=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download source tarball
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          curl -L "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz" \
            -o "source-${TAG}.tar.gz"

      - name: Read checksum
        id: sha
        run: |
          SOURCE_SHA=$(sha256sum "source-${{ steps.vars.outputs.tag }}.tar.gz" | cut -d' ' -f1)
          echo "source=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        env:
          TAG: ${{ steps.vars.outputs.tag }}
          VERSION: ${{ steps.vars.outputs.version }}
          SHA_SOURCE: ${{ steps.sha.outputs.source }}
          FORMULA_PATH: ${{ steps.vars.outputs.formula_path }}
          FORMULA_CLASS: ${{ steps.vars.outputs.formula_class }}
          DESC_SUFFIX: ${{ steps.vars.outputs.desc_suffix }}
          CONFLICT_FORMULA: ${{ steps.vars.outputs.conflict_formula }}
          CAVEAT_EXTRA: ${{ steps.vars.outputs.caveat_extra }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os

          template = Path(".github/formula-template.rb").read_text()
          replacements = {
              "{{VERSION}}": os.environ["VERSION"],
              "{{TAG}}": os.environ["TAG"],
              "{{SHA_SOURCE}}": os.environ["SHA_SOURCE"],
              "{{CLASS_NAME}}": os.environ["FORMULA_CLASS"],
              "{{DESC_SUFFIX}}": os.environ["DESC_SUFFIX"],
              "{{CONFLICT_FORMULA}}": os.environ["CONFLICT_FORMULA"],
              "{{CAVEAT_EXTRA}}": os.environ["CAVEAT_EXTRA"],
          }
          for key, value in replacements.items():
              template = template.replace(key, value)

          Path(os.environ["FORMULA_PATH"]).write_text(template)
          PY

      - name: Commit and push formula update
        env:
          TAG: ${{ steps.vars.outputs.tag }}
          FORMULA_PATH: ${{ steps.vars.outputs.formula_path }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA_PATH"
          git commit -m "build(homebrew): update formula for ${TAG}" || echo "No changes to commit"
          git push origin HEAD:main
